<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号密码保险箱</title>
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2735;
    --surface2: #223344;
    --border: #2e4a5f;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --success: #22c55e;
    --warning: #f59e0b;
    --text: #e8edf2;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 10px;
    --admin-accent: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ===== LOGIN PAGE ===== */
  .login-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 20%, rgba(34,197,94,0.06) 0%, transparent 50%);
  }
  .login-page.hidden { display: none; }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-box .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .login-box .login-logo svg { width: 32px; height: 32px; }
  .login-box .login-subtitle {
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .login-tab-bar {
    display: flex;
    margin-bottom: 24px;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
  }
  .login-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text3);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .login-tab.active {
    background: var(--accent);
    color: #fff;
  }
  .login-form .form-group { margin-bottom: 18px; }
  .login-form .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .login-form .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-form .form-group input:focus { border-color: var(--accent); }
  .login-form .form-group input::placeholder { color: var(--text3); }
  .remember-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .remember-row label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .remember-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--accent-hover); }
  .login-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 16px;
    line-height: 1.8;
  }
  .forgot-link {
    text-align: center;
    margin-top: 12px;
  }
  .forgot-link a {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
  }
  .forgot-link a:hover { text-decoration: underline; }

  /* Reset password modal */
  .reset-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 210;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 16px;
    overflow-y: auto;
  }
  .reset-overlay.active { display: flex; }
  .reset-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    width: 100%;
    max-width: 420px;
    animation: modalIn 0.2s ease;
  }
  .reset-box h2 {
    font-size: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .reset-box .form-group { margin-bottom: 16px; }
  .reset-box .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .reset-box .form-group input,
  .reset-box .form-group select {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .reset-box .form-group input:focus,
  .reset-box .form-group select:focus { border-color: var(--accent); }
  .reset-box .form-group input::placeholder { color: var(--text3); }
  .reset-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .reset-info {
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .reset-info strong { color: var(--warning); }

  /* Quick user list on login */
  .quick-users {
    margin-bottom: 24px;
    padding-top: 4px;
  }
  .quick-users-title {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .quick-user-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .quick-user-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: all 0.2s;
    background: var(--bg);
  }
  .quick-user-item:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .quick-user-item .qavatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .quick-user-item .qavatar.admin { background: var(--admin-accent); }
  .quick-user-item .qavatar.member { background: var(--accent); }
  .quick-user-item .qname {
    font-size: 12px;
    color: var(--text2);
    max-width: 64px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .quick-user-item .qrole {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 500;
  }
  .qrole.admin { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .qrole.member { background: rgba(59,130,246,0.2); color: #3b82f6; }

  /* ===== Shared: Buttons ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }
  .btn-primary { background: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-outline { background: transparent; border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--surface2); border-color: var(--accent); }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-ghost { background: transparent; padding: 6px 10px; }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  .btn svg { width: 16px; height: 16px; }
  .btn-admin { background: var(--admin-accent); }
  .btn-admin:hover { background: #d97706; }

  /* ===== Shared: Header ===== */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-admin { background: linear-gradient(135deg, #2a1f0a 0%, #0f1923 100%); }
  .header-member { background: linear-gradient(135deg, #1a2735 0%, #0f1923 100%); }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
  }
  .logo svg { width: 26px; height: 26px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: var(--text2);
  }
  .user-badge.admin-badge { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
  .user-badge.member-badge { background: var(--surface2); border: 1px solid var(--border); }
  .user-badge .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }
  .avatar.admin { background: var(--admin-accent); }
  .avatar.member { background: var(--accent); }
  .role-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-left: 4px;
  }
  .role-tag.admin { background: var(--admin-accent); color: #000; }
  .role-tag.member { background: var(--accent); color: #fff; }

  /* ===== Shared: Container ===== */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ===== Shared: Stats ===== */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .stat-card .label { font-size: 13px; color: var(--text3); margin-bottom: 4px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }

  /* ===== ADMIN PAGE ===== */
  .admin-page { display: none; }
  .admin-page.active { display: block; }

  .admin-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
  }
  .admin-tab {
    flex: 1;
    padding: 12px 20px;
    text-align: center;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text3);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .admin-tab.active {
    background: var(--admin-accent);
    color: #000;
    font-weight: 600;
  }
  .admin-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* User cards for admin */
  .user-card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .user-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all 0.2s;
  }
  .user-card:hover {
    border-color: var(--admin-accent);
    box-shadow: 0 0 0 1px var(--admin-accent), 0 4px 20px rgba(245,158,11,0.1);
  }
  .user-card.is-self {
    border-color: var(--admin-accent);
    background: linear-gradient(135deg, rgba(245,158,11,0.05) 0%, var(--surface) 100%);
  }
  .user-card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .user-card-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .user-card-avatar.admin { background: var(--admin-accent); }
  .user-card-avatar.member { background: var(--accent); }
  .user-card-info { flex: 1; min-width: 0; }
  .user-card-name { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .user-card-username { font-size: 12px; color: var(--text3); }
  .user-card-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 8px;
  }
  .user-card-stat { text-align: center; flex: 1; }
  .user-card-stat .num { font-size: 20px; font-weight: 700; color: var(--text); }
  .user-card-stat .desc { font-size: 11px; color: var(--text3); }
  .user-card-actions { display: flex; gap: 8px; }
  .user-card-time { font-size: 11px; color: var(--text3); margin-top: 10px; }

  /* Admin view-user-vault panel */
  .admin-vault-panel {
    display: none;
  }
  .admin-vault-panel.active { display: block; }
  .admin-vault-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .admin-vault-header .back-btn {
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .admin-vault-header .back-btn:hover { border-color: var(--admin-accent); }
  .admin-vault-title { flex: 1; font-size: 16px; font-weight: 600; }
  .admin-vault-note { font-size: 12px; color: var(--warning); }

  /* ===== MEMBER PAGE ===== */
  .member-page { display: none; }
  .member-page.active { display: block; }

  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text3); }
  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text3);
  }
  .filter-select {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); }

  /* Cards */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(59,130,246,0.1);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-category {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .card-actions { display: flex; gap: 2px; }
  .card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(46,74,95,0.4);
  }
  .card-row:last-child { border-bottom: none; }
  .card-row .label { color: var(--text3); min-width: 60px; flex-shrink: 0; }
  .card-row .value {
    flex: 1;
    margin: 0 8px;
    word-break: break-all;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }
  .card-row .value.hidden-pw {
    color: transparent;
    text-shadow: 0 0 8px var(--text3);
    user-select: none;
  }
  .card-row .value.hidden-pw.revealed {
    color: var(--text);
    text-shadow: none;
    user-select: auto;
  }
  .card-row .actions { display: flex; gap: 4px; flex-shrink: 0; }
  .card-note {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    font-size: 13px;
    color: var(--text2);
  }
  .card-footer {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text3);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 16px; margin-bottom: 8px; }

  /* ===== MODALS ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 16px;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    width: 100%;
    max-width: 520px;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal h2 {
    font-size: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .pw-gen-row { display: flex; gap: 8px; }
  .pw-gen-row input { flex: 1; }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .pw-strength { margin-top: 6px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
  .pw-strength-bar { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .pw-strength-text { font-size: 12px; margin-top: 3px; }

  /* Toast */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 20px; border-radius: 8px; font-size: 14px; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards; max-width: 320px; }
  .toast-success { background: #166534; color: #bbf7d0; }
  .toast-error { background: #991b1b; color: #fecaca; }
  .toast-info { background: #1e3a5f; color: #bfdbfe; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* Confirm */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 250; justify-content: center; align-items: center; }

<script>
// ===== Constants =====
const USERS_KEY = 'vault_users';
const SESSION_KEY = 'vault_session';
const ADMIN_ROLE = 'admin';
const MEMBER_ROLE = 'member';

// ===== Crypto =====
async function hashPassword(password, salt) {
  const encoder = new TextEncoder();
  const data = encoder.encode(salt + password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ===== Storage =====
function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; } }
function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
function getCurrentSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; } }
function setSession(user, remember) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    username: user.username,
    nickname: user.nickname || user.username,
    role: user.role || MEMBER_ROLE,
    loginAt: Date.now(),
    remember: remember
  }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }
function isSessionValid(s) {
  if (!s || !s.username) return false;
  // Remember me = permanent; not remembered = 24 hours
  if (s.remember) return true;
  return (Date.now() - s.loginAt) < 24 * 3600 * 1000;
}
function getUserDataKey(username) { return 'vault_data_' + username; }
function loadUserData(username) { try { return JSON.parse(localStorage.getItem(getUserDataKey(username))) || []; } catch { return []; } }
function saveUserData(username, data) { localStorage.setItem(getUserDataKey(username), JSON.stringify(data)); }

function getUserCount() { return Object.keys(getUsers()).length; }

// ===== State =====
let currentUser = null;  // session object
let accounts = [];       // current user's vault data
let viewingUsername = null; // admin viewing another user
let currentAdminTab = 'users';

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function getCategoryIcon(cat) {
  return { '社交':'💬','购物':'🛒','金融':'💰','工作':'💼','娱乐':'🎮','学习':'📚','邮箱':'📧','开发':'💻','其他':'📌' }[cat] || '📌';
}
function getStrength(pw) {
  if (!pw) return 0;
  let s = 0;
  if (pw.length >= 8) s++;
  if (pw.length >= 12) s++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
  if (/\d/.test(pw)) s++;
  if (/[^a-zA-Z0-9]/.test(pw)) s++;
  return Math.min(s, 4);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('已复制到剪贴板');
  });
}

// ===== Login Page =====
function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  // Show security question fields only when registering and no users exist yet (will be admin)
  if (tab === 'register') {
    const willBeAdmin = Object.keys(getUsers()).length === 0;
    document.getElementById('secQuestionGroup').style.display = willBeAdmin ? '' : 'none';
  } else {
    document.getElementById('secQuestionGroup').style.display = 'none';
  }
}

function renderQuickUsers() {
  const container = document.getElementById('quickUsers');
  // Only show quick user list for admin (first user)
  const users = getUsers();
  const entries = Object.values(users);
  const hasAdmin = entries.some(u => u.role === ADMIN_ROLE);
  if (!hasAdmin || !entries.length) { container.style.display = 'none'; container.innerHTML = ''; return; }
  // Show only for admin - but since we can't know who's logging in, show only admin's avatar
  const admin = entries.find(u => u.role === ADMIN_ROLE);
  container.style.display = '';
  container.innerHTML = `
    <div class="quick-users-title">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      管理员快速登录

function quickFillUser(username) {

}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim().toLowerCase();
  const password = document.getElementById('loginPass').value;
  const remember = document.getElementById('rememberMe').checked;
  if (!username) { toast('请输入用户名', 'error'); return; }
  if (!password) { toast('请输入密码', 'error'); return; }
  const users = getUsers();
  if (!users[username]) { toast('用户不存在，请先注册', 'error'); return; }
  const hashed = await hashPassword(password, 'vault_salt_' + username);
  if (users[username].password !== hashed) { toast('密码错误', 'error'); return; }
  setSession(users[username], remember);
  enterApp();
  toast('欢迎回来，' + (users[username].nickname || username));
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim().toLowerCase();
  const nickname = document.getElementById('regNick').value.trim();
  const password = document.getElementById('regPass').value;
  const password2 = document.getElementById('regPass2').value;
  if (!username) { toast('请输入用户名', 'error'); return; }
  if (!/^[a-zA-Z0-9_]{2,20}$/.test(username)) { toast('用户名只能含英文、数字、下划线，2-20位', 'error'); return; }
  if (!password) { toast('请设置密码', 'error'); return; }
  if (password.length < 6) { toast('密码至少6位', 'error'); return; }
  if (password !== password2) { toast('两次密码不一致', 'error'); return; }
  const users = getUsers();
  if (users[username]) { toast('该用户名已被注册', 'error'); return; }

  const isFirstUser = Object.keys(users).length === 0;
  const secQuestion = document.getElementById('regSecQuestion').value;
  const secAnswer = document.getElementById('regSecAnswer').value.trim();
  if (isFirstUser && (!secQuestion || !secAnswer)) { toast('管理员必须设置密保问题，用于找回密码', 'error'); return; }
  const hashed = await hashPassword(password, 'vault_salt_' + username);
  users[username] = {
    username,
    nickname: nickname || username,
    password: hashed,
    role: isFirstUser ? ADMIN_ROLE : MEMBER_ROLE,
    createdAt: Date.now(),
    secQuestion: isFirstUser ? secQuestion : '',
    secAnswerHash: isFirstUser ? await hashPassword(secAnswer.toLowerCase(), 'vault_sec_' + username) : ''
  };
  saveUsers(users);
  setSession(users[username], true);
  enterApp();
  toast(isFirstUser ? '注册成功！你是管理员，可管理所有用户' : '注册成功，欢迎 ' + (nickname || username));
}

        <div class="user-card-stats">
          <div class="user-card-stat"><div class="num">${data.length}</div><div class="desc">密码条数</div></div>
          <div class="user-card-stat"><div class="num" style="color:${weakCount ? '#ef4444' : '#22c55e'}">${weakCount}</div><div class="desc">弱密码</div></div>
          <div class="user-card-stat"><div class="num">${cats.length}</div><div class="desc">分类</div></div>
        </div>
        <div class="user-card-actions">
          ${data.length > 0 ? `<button class="btn btn-outline btn-sm" onclick="viewUserVault('${esc(u.username)}')">查看密码库</button>` : ''}
          ${isSelf ? `<button class="btn btn-admin btn-sm" onclick="switchAdminTab('myvault');document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.admin-tab')[1].classList.add('active');">管理我的密码</button>` : ''}

let resetTargetUser = null;

function openResetModal() {
  resetTargetUser = null;
  document.getElementById('resetUser').value = '';
  document.getElementById('resetSecAnswer').value = '';
  document.getElementById('resetNewPass').value = '';
  document.getElementById('resetNewPass2').value = '';
  document.getElementById('resetStep1').style.display = '';
  document.getElementById('resetStep2Admin').style.display = 'none';
  document.getElementById('resetStep2Member').style.display = 'none';
  document.getElementById('resetOverlay').classList.add('active');
}

function closeResetModal() {
  document.getElementById('resetOverlay').classList.remove('active');
  resetTargetUser = null;
}

function checkResetUser() {
  const username = document.getElementById('resetUser').value.trim().toLowerCase();
  if (!username) { toast('请输入用户名', 'error'); return; }
  const users = getUsers();
  if (!users[username]) { toast('该用户不存在', 'error'); return; }
  resetTargetUser = users[username];
  document.getElementById('resetStep1').style.display = 'none';

  if (resetTargetUser.role === ADMIN_ROLE) {
    // Admin: show security question
    if (!resetTargetUser.secQuestion || !resetTargetUser.secAnswerHash) {
      toast('管理员未设置密保问题，无法通过此方式找回密码', 'error');
      closeResetModal();
      return;
    }
    document.getElementById('resetSecQuestion').textContent = resetTargetUser.secQuestion;
    document.getElementById('resetStep2Admin').style.display = '';
  } else {
    // Member: tell them to contact admin
    document.getElementById('resetStep2Member').style.display = '';
  }
}

async function doResetAdminPassword() {
  if (!resetTargetUser) return;
  const answer = document.getElementById('resetSecAnswer').value.trim();
  const newPass = document.getElementById('resetNewPass').value;
  const newPass2 = document.getElementById('resetNewPass2').value;
  if (!answer) { toast('请输入密保答案', 'error'); return; }
  if (!newPass) { toast('请输入新密码', 'error'); return; }
  if (newPass.length < 6) { toast('新密码至少6位', 'error'); return; }
  if (newPass !== newPass2) { toast('两次新密码不一致', 'error'); return; }

  const answerHash = await hashPassword(answer.toLowerCase(), 'vault_sec_' + resetTargetUser.username);
  if (answerHash !== resetTargetUser.secAnswerHash) {
    toast('密保答案错误', 'error');
    return;
  }

  const users = getUsers();
  const hashed = await hashPassword(newPass, 'vault_salt_' + resetTargetUser.username);
  users[resetTargetUser.username].password = hashed;
  saveUsers(users);
  closeResetModal();
  toast('密码重置成功，请使用新密码登录');
}

function enterMemberPage() {

  document.getElementById('memberDisplay').textContent = displayName;

function refreshMember() {
  renderMemberStats();
  updateCategoryFilter();
  renderCards();
}

function renderMemberStats() {
  const total = accounts.length;
  const cats = {};
  let weakCount = 0;
  accounts.forEach(a => { cats[a.category] = (cats[a.category]||0) + 1; if (getStrength(a.password) < 2) weakCount++; });
  const topCat = Object.entries(cats).sort((a,b) => b[1] - a[1])[0];
  document.getElementById('memberStats').innerHTML = `
    <div class="stat-card"><div class="label">总账号数</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">分类数</div><div class="value">${Object.keys(cats).length}</div></div>
    <div class="stat-card"><div class="label">最多分类</div><div class="value" style="font-size:20px">${topCat ? topCat[0] : '-'}</div></div>
    <div class="stat-card"><div class="label">弱密码</div><div class="value" style="color:${weakCount ? '#ef4444' : '#22c55e'}">${weakCount}</div></div>
  `;
}

function updateCategoryFilter() {
  const cats = [...new Set(accounts.map(a => a.category))].sort();
  const sel = document.getElementById('categoryFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部分类</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = cur;
}

function renderCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const catFilter = document.getElementById('categoryFilter').value;
  const sort = document.getElementById('sortSelect').value;
  let filtered = accounts.filter(a => {
    if (catFilter && a.category !== catFilter) return false;
    if (search) return a.name.toLowerCase().includes(search) || a.username.toLowerCase().includes(search) || (a.note||'').toLowerCase().includes(search) || (a.url||'').toLowerCase().includes(search);
    return true;
  });
  if (sort === 'newest') filtered.sort((a,b) => b.createdAt - a.createdAt);
  else if (sort === 'oldest') filtered.sort((a,b) => a.createdAt - b.createdAt);
  else if (sort === 'alpha') filtered.sort((a,b) => a.name.localeCompare(b.name, 'zh'));
  const grid = document.getElementById('cardGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <p>${search || catFilter ? '没有匹配的账号' : '还没有添加任何账号'}</p>
      <p style="font-size:14px">${search || catFilter ? '试试其他关键词或分类' : '点击右上角「新增账号」开始记录'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(a => renderVaultCard(a, false)).join('');
}

  if (!a) return;
  document.getElementById('editId').value = id;

function closeModal() { document.getElementById('modal').classList.remove('active'); }

function saveEntry() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('fName').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const username = document.getElementById('fUsername').value.trim();
  const password = document.getElementById('fPassword').value;
  const note = document.getElementById('fNote').value.trim();
  const category = document.getElementById('fCategory').value;
  if (!name) { toast('请填写网站/应用名称', 'error'); return; }
  if (!username) { toast('请填写登录账号', 'error'); return; }
  if (!password) { toast('请填写密码', 'error'); return; }
  if (id) {
    const idx = accounts.findIndex(a => a.id === id);
    if (idx >= 0) accounts[idx] = { ...accounts[idx], name, url, username, password, note, category, updatedAt: Date.now() };
    toast('账号已更新');
  } else {
    accounts.push({ id: genId(), name, url, username, password, note, category, createdAt: Date.now(), updatedAt: Date.now() });
    toast('账号已添加');
  }
  saveUserData(currentUser.username, accounts);
  closeModal();
  if (currentUser.role === ADMIN_ROLE) { renderAdminVault(); renderAdminStats(); renderAdminUsers(); }
  else refreshMember();
}

}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingDeleteId = null;
  pendingDeleteUserId = null;
}

document.getElementById('confirmBtn').onclick = function() {
  if (pendingDeleteUserId) {
    const users = getUsers();
    const nickname = users[pendingDeleteUserId]?.nickname || pendingDeleteUserId;
    delete users[pendingDeleteUserId];
    saveUsers(users);
    localStorage.removeItem(getUserDataKey(pendingDeleteUserId));
    toast('用户 ' + nickname + ' 已删除');
    pendingDeleteUserId = null;
    renderAdminUsers();
    renderAdminStats();
    closeConfirm();
    return;
  }
  if (pendingDeleteId) {
    accounts = accounts.filter(a => a.id !== pendingDeleteId);
    saveUserData(currentUser.username, accounts);
    toast('已删除');
    if (currentUser.role === ADMIN_ROLE) { renderAdminVault(); renderAdminStats(); renderAdminUsers(); }
    else refreshMember();
  }
  closeConfirm();
};

// ===== Password Generator & Strength =====
function generatePassword() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  let pw = '';
  const arr = new Uint32Array(16);
  crypto.getRandomValues(arr);
  for (let i = 0; i < 16; i++) pw += chars[arr[i] % chars.length];
  document.getElementById('fPassword').value = pw;
  updateStrength();
}

function togglePwVisibility(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}

function updateStrength() {
  const pw = document.getElementById('fPassword').value;
  const s = getStrength(pw);
  const bar = document.getElementById('pwStrengthBar');
  const text = document.getElementById('pwStrengthText');
  const levels = [
    { w: '0%', c: '#64748b', t: '' },
    { w: '25%', c: '#ef4444', t: '弱 — 建议加强' },
    { w: '50%', c: '#f97316', t: '中等' },
    { w: '75%', c: '#eab308', t: '较强' },
    { w: '100%', c: '#22c55e', t: '强' },
  ];
  const l = levels[s];
  bar.style.width = l.w;
  bar.style.background = l.c;
  text.textContent = l.t;
  text.style.color = l.c;
}

// ===== Export / Import =====
function exportData() {
  if (!accounts.length) { toast('暂无数据可导出', 'error'); return; }
  const blob = new Blob([JSON.stringify(accounts, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `密码保险箱_${currentUser.nickname || currentUser.username}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('数据已导出');
}

function importData() { document.getElementById('importFile').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      let added = 0;
      data.forEach(item => {
        if (item.name && item.username && item.password) {
          accounts.push({ id: item.id || genId(), name: item.name, url: item.url || '', username: item.username, password: item.password, note: item.note || '', category: item.category || '其他', createdAt: item.createdAt || Date.now(), updatedAt: item.updatedAt || Date.now() });
          added++;
        }
      });
      saveUserData(currentUser.username, accounts);
      if (currentUser.role === ADMIN_ROLE) { renderAdminVault(); renderAdminStats(); }
      else refreshMember();
      toast(`成功导入 ${added} 条账号`);
    } catch { toast('导入失败，文件格式不正确', 'error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ===== Modal close on overlay =====
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('confirmOverlay').addEventListener('click', function(e) { if (e.target === this) closeConfirm(); });
document.getElementById('resetOverlay').addEventListener('click', function(e) { if (e.target === this) closeResetModal(); });
document.getElementById('adminResetModal').addEventListener('click', function(e) { if (e.target === this) closeAdminResetModal(); });

// ===== Keyboard =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); closeViewVault(); closeResetModal(); closeAdminResetModal(); }
  if (e.key === 'Enter' && !document.getElementById('loginPage').classList.contains('hidden')) {
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doRegister();
  }
});

// ===== Init =====
(function init() {
  const session = getCurrentSession();
  if (session && isSessionValid(session)) {
    const users = getUsers();
    if (users[session.username]) {
      // Refresh role from stored user data
      session.role = users[session.username].role || MEMBER_ROLE;
      currentUser = session;
      enterApp();
      return;
    }
  }
  clearSession();
  document.getElementById('loginPage').classList.remove('hidden');
  renderQuickUsers();
})();
</script>
